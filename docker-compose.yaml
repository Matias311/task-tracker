services:

  postgres:
    image: postgres:16
    container_name: task-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - ./src/main/resources/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  app:
    build: .
    container_name: task-app
    env_file: .env
    stdin_open: true
    tty: true
    depends_on:
      - postgres
